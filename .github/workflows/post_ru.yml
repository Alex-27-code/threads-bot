name: Post to Threads RU

on:
  schedule:
    - cron: '15 7 * * *'
    - cron: '45 9 * * *'
    - cron: '0 12 * * *'
    - cron: '20 13 * * *'
    - cron: '50 15 * * *'
    - cron: '10 18 * * *'
    - cron: '30 20 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Random delay
        run: sleep $((RANDOM % 1200))

      - name: Install dependencies
        run: pip install openai requests

      - name: Post to Threads RU
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THREADS_ACCESS_TOKEN_RU: ${{ secrets.THREADS_ACCESS_TOKEN_RU }}
          THREADS_USER_ID_RU: ${{ secrets.THREADS_USER_ID_RU }}
        run: python post_once_ru.py
